services:
  postgres:
    image: postgres:17-alpine
    container_name: tyf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-testyourfriends}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tyf-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-testyourfriends}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tyf-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis}
    volumes:
      - redis_data:/data
    networks:
      - tyf-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=false"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tyf-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-testyourfriends}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      CORS_ORIGINS: https://testyourfriends.com
      APP_BASE_URL: https://testyourfriends.com
      AWS_REGION: ${AWS_REGION:-}
      AWS_SMTP_USER: ${AWS_SMTP_USER:-}
      AWS_SMTP_PASS: ${AWS_SMTP_PASS:-}
      SES_FROM_EMAIL: ${SES_FROM_EMAIL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tyf-network
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tyf-backend.rule=Host(`testyourfriends.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.tyf-backend.entrypoints=websecure"
      - "traefik.http.routers.tyf-backend.tls.certresolver=myresolver"
      - "traefik.http.routers.tyf-backend.priority=20"
      - "traefik.http.middlewares.tyf-strip-api.stripprefix.prefixes=/api"
      - "traefik.http.routers.tyf-backend.middlewares=tyf-strip-api,sec-headers@docker"
      - "traefik.http.services.tyf-backend.loadbalancer.server.port=3000"
      - "traefik.docker.network=infrastructure_staging-network"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://testyourfriends.com/api
    container_name: tyf-frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:3000
    depends_on:
      - backend
    networks:
      - tyf-network
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tyf-frontend.rule=Host(`testyourfriends.com`)"
      - "traefik.http.routers.tyf-frontend.entrypoints=websecure"
      - "traefik.http.routers.tyf-frontend.tls.certresolver=myresolver"
      - "traefik.http.routers.tyf-frontend.priority=10"
      - "traefik.http.routers.tyf-frontend.middlewares=sec-headers@docker"
      - "traefik.http.services.tyf-frontend.loadbalancer.server.port=3000"
      - "traefik.docker.network=infrastructure_staging-network"

networks:
  tyf-network:
    driver: bridge
  traefik-network:
    external: true
    name: infrastructure_staging-network

volumes:
  postgres_data:
  redis_data:
