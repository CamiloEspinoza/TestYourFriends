name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (default: sha-<short>)"
        required: false

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/camiloespinoza/testyourfriends/api
  WEB_IMAGE: ghcr.io/camiloespinoza/testyourfriends/web

jobs:
  # ─── Job 1: Build Docker images and push to ghcr.io ─────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="sha-${GITHUB_SHA::7}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "IMAGE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Set up QEMU (multi-arch support)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.WEB_IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      # Save images as tarballs for transfer to server
      - name: Pull and save images
        run: |
          docker pull ${{ env.API_IMAGE }}:${{ env.IMAGE_TAG }}
          docker pull ${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }}
          docker save ${{ env.API_IMAGE }}:${{ env.IMAGE_TAG }} | gzip > /tmp/api-image.tar.gz
          docker save ${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }} | gzip > /tmp/web-image.tar.gz

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            /tmp/api-image.tar.gz
            /tmp/web-image.tar.gz
          retention-days: 1

  # ─── Job 2: Deploy to server via SSH ────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp/images

      - name: Transfer and load images on server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "/tmp/images/*"
          target: "/tmp/tyf-deploy"
          strip_components: 2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 300s
          script: |
            set -euo pipefail
            IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            echo "Loading Docker images..."
            docker load < /tmp/tyf-deploy/api-image.tar.gz
            docker load < /tmp/tyf-deploy/web-image.tar.gz
            rm -rf /tmp/tyf-deploy
            echo "Deploying tag: $IMAGE_TAG"
            bash /opt/tyf/scripts/deploy.sh "$IMAGE_TAG"
