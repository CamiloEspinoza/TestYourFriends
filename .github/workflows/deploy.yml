name: Deploy to Production

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # ──────────────────────────────────────────────
  # 1. Build & push Docker images
  # ──────────────────────────────────────────────
  build:
    name: Build Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image names (GHCR requires lowercase)
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "BACKEND_IMAGE=ghcr.io/${REPO_LOWER}/api" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=ghcr.io/${REPO_LOWER}/web" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend (api)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.BACKEND_IMAGE }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_SITE_URL=https://testyourfriends.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # 2. Deploy al VPS
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Check deploy secrets
        run: |
          if [ -z "$SERVER_HOST" ]; then
            echo "::error::Missing SERVER_HOST. Add SERVER_HOST, SERVER_USER, SERVER_SSH_KEY in repository secrets."
            exit 1
          fi
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 5m
          envs: POSTGRES_PASSWORD,DATABASE_URL,REDIS_PASSWORD,JWT_SECRET,AWS_REGION,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,SES_FROM_EMAIL
          script: |
            set -e
            cat > /opt/tyf/.env.production << 'ENVEOF'
            POSTGRES_USER=postgres
            POSTGRES_DB=testyourfriends
            NODE_ENV=production
            REDIS_HOST=tyf-redis
            REDIS_PORT=6379
            JWT_EXPIRATION=7d
            CORS_ORIGINS=https://testyourfriends.com
            APP_BASE_URL=https://testyourfriends.com
            ENVEOF
            echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}" >> /opt/tyf/.env.production
            echo "DATABASE_URL=${DATABASE_URL}" >> /opt/tyf/.env.production
            echo "REDIS_PASSWORD=${REDIS_PASSWORD}" >> /opt/tyf/.env.production
            echo "JWT_SECRET=${JWT_SECRET}" >> /opt/tyf/.env.production
            echo "AWS_REGION=${AWS_REGION}" >> /opt/tyf/.env.production
            echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}" >> /opt/tyf/.env.production
            echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}" >> /opt/tyf/.env.production
            echo "SES_FROM_EMAIL=${SES_FROM_EMAIL}" >> /opt/tyf/.env.production
            /opt/tyf/scripts/deploy.sh "${{ needs.build.outputs.image_tag }}"
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          AWS_REGION: ${{ secrets.AWS_SES_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_SES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SES_SECRET_ACCESS_KEY }}
          SES_FROM_EMAIL: ${{ secrets.AWS_SES_FROM_EMAIL }}
