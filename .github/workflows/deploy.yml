name: Deploy to Production

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # ──────────────────────────────────────────────
  # 1. Build & push Docker images
  # ──────────────────────────────────────────────
  build:
    name: Build Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image names (GHCR requires lowercase)
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "BACKEND_IMAGE=ghcr.io/${REPO_LOWER}/backend" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=ghcr.io/${REPO_LOWER}/frontend" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # 2. Deploy al VPS
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Check deploy secrets
        run: |
          if [ -z "$SERVER_HOST" ]; then
            echo "::error::Missing SERVER_HOST. Add SERVER_HOST, SERVER_USER, SERVER_SSH_KEY in repository secrets."
            exit 1
          fi
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            cd /opt/testyourfriends

            export IMAGE_TAG=${{ needs.build.outputs.image_tag }}
            export GITHUB_REPOSITORY=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

            echo "==> Pulling new images (tag: $IMAGE_TAG) — sin interrumpir aún"
            IMAGE_TAG=$IMAGE_TAG GITHUB_REPOSITORY=$GITHUB_REPOSITORY \
              docker compose -f docker-compose.prod.yml pull backend frontend

            # ── INICIO DE DOWNTIME ──────────────────────────────────────────
            # El viejo backend se apaga ANTES de que corra la migración.
            # Así no hay ventana donde el viejo código vea el schema nuevo.
            # Downtime esperado: ~20-40s (migrate + seed + nest boot)
            echo "==> Stopping old backend"
            docker compose -f docker-compose.prod.yml stop backend

            echo "==> Starting new backend (migrate → seed → serve)"
            IMAGE_TAG=$IMAGE_TAG GITHUB_REPOSITORY=$GITHUB_REPOSITORY \
              docker compose -f docker-compose.prod.yml up -d --no-deps backend

            echo "==> Waiting for backend health check (timeout 120s)..."
            timeout 120 bash -c '
              until docker inspect --format="{{.State.Health.Status}}" tyf-backend 2>/dev/null | grep -q "healthy"; do
                echo "  still waiting..."
                sleep 5
              done
            ' || {
              echo "❌ Backend no llegó a healthy — haciendo rollback"
              docker compose -f docker-compose.prod.yml stop backend
              # Rollback: volver a la imagen anterior (latest apunta a la anterior hasta que el push tenga éxito)
              # Revisar logs: docker logs tyf-backend --tail 100
              exit 1
            }
            # ── FIN DE DOWNTIME ─────────────────────────────────────────────

            echo "==> Backend healthy — deploying frontend"
            IMAGE_TAG=$IMAGE_TAG GITHUB_REPOSITORY=$GITHUB_REPOSITORY \
              docker compose -f docker-compose.prod.yml up -d --no-deps frontend

            echo "==> Reloading nginx"
            docker compose -f docker-compose.prod.yml exec nginx nginx -s reload

            echo "==> Cleaning up old images"
            docker image prune -f

            echo "✅ Deploy completado: $IMAGE_TAG"
